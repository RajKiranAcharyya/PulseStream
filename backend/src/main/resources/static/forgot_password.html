<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseStream - Recovery</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.png" />
    <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:300,400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/modern.css">
</head>
<body>
    <div class="pulsestream-bg"></div>
    <div class="container d-flex justify-content-center">
        <div class="glass-card p-5 recovery-card text-center">
            <div class="mb-4">
                <i class="fa fa-lock fa-3x text-accent mb-3"></i>
                <h3 class="font-weight-bold">Account Recovery</h3>
                <p class="text-muted small">Enter your PulseStream ID (email) to receive a secure restoration link.</p>
            </div>
            
            <form id="forgotForm">
                <div class="form-group mb-4 text-left">
                    <label class="small text-white-50">PulseStream ID / Email</label>
                    <input type="email" name="email" class="form-control-modern form-control" required placeholder="name@domain.com">
                </div>
                <button type="submit" class="btn-pulse w-100 mb-4">Initialize Recovery</button>
                <div>
                    <a href="index.html" class="small text-muted"><i class="fa fa-arrow-left mr-2"></i>Return to Portal</a>
                </div>
            </form>
            
            <div id="message" class="mt-4 p-3 glass-card" style="display:none; border-color: rgba(255,255,255,0.1);"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="js/modern.js"></script>
</body>
</html>
