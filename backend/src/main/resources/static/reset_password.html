<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseStream - Reset Ritual</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.png" />
    <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:300,400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/modern.css">
</head>
<body>
    <div class="pulsestream-bg"></div>
    
    <div id="resetContainer" class="container" style="display:none;">
        <div class="glass-card p-5 reset-card mx-auto text-center">
            <div class="mb-4">
                <i class="fa fa-key fa-3x text-accent mb-3"></i>
                <h3 class="font-weight-bold">Set New Credentials</h3>
                <p class="text-muted small">Establish a secure access key for your PulseStream account.</p>
            </div>
            <form id="resetForm">
                <input type="hidden" name="token" id="tokenField">
                <div class="form-group mb-4 text-left">
                    <label class="small text-white-50">New Secure Password</label>
                    <input type="password" name="password" id="pass" class="form-control-modern form-control" required minlength="6">
                </div>
                <div class="form-group mb-4 text-left">
                    <label class="small text-white-50">Confirm Credentials</label>
                    <input type="password" id="cpass" class="form-control-modern form-control" required minlength="6">
                </div>
                <button type="submit" class="btn-pulse w-100">Synchronize Security</button>
            </form>
            <div id="message" class="mt-4 p-3 glass-card" style="display:none;"></div>
        </div>
    </div>

    <div id="errorContainer" class="container text-center error-overlay">
        <div class="glass-card p-5 reset-card mx-auto">
            <i class="fa fa-times-circle fa-4x text-danger mb-4"></i>
            <h3 class="font-weight-bold">Link Decommissioned</h3>
            <p class="text-muted">This specific restoration relay has expired or is invalid.</p>
            <a href="forgot_password.html" class="btn-pulse d-inline-block mt-3 px-5">Request New Link</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="js/modern.js"></script>
</body>
</html>
