<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseStream - Patient Login</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.png" />
    <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:300,400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/modern.css">
</head>
<body>
    <div class="pulsestream-bg"></div>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand font-weight-bold d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="PulseStream" class="ps-logo mr-2"> PulseStream
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">HOME</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="glass-card login-card">
            <img src="images/logo.png" alt="logo" />
            <h2 class="font-weight-bold mb-4">Patient Login</h2>
            <form action="/login" method="post">
                <div class="form-group text-left">
                    <label class="small text-white-50 ml-2">Email Address</label>
                    <input type="email" name="username" class="form-control-modern form-control" placeholder="patient@example.com" required />
                </div>
                <div class="form-group text-left">
                    <label class="small text-white-50 ml-2">Password</label>
                    <input type="password" name="password" class="form-control-modern form-control" placeholder="••••••••" required />
                </div>
                <input type="submit" class="btn-pulse btn-login" value="Login" />
                <div class="mt-4">
                    <a href="forgot_password.html" class="small text-white-50">Forgot Password?</a>
                    <span class="mx-2 text-white-50">|</span>
                    <a href="index.html" class="small text-white-50">New here? Register</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="js/modern.js"></script>
</body>
</html>
