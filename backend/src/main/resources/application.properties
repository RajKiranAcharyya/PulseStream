# // Old Password: dMVGx9DiEqL9aPLK (Commented out for security)
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:REPLACE_IN_RENDER_DASHBOARD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
# (Optional) spring.security.user.name=admin
# (Optional) spring.security.user.password=admin123

# File upload limit (if needed)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Server Port
server.port=8080

# PulseStream - Email Service Configuration (Live)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:REPLACE_IN_RENDER_DASHBOARD}
# // Old App Password: wayaggithkmvyzhk (Commented out for security)
spring.mail.password=${SPRING_MAIL_PASSWORD:REPLACE_IN_RENDER_DASHBOARD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# Enhanced Email Logging
logging.level.org.springframework.mail=DEBUG
spring.mail.properties.mail.debug=true