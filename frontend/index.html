<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseStream - Healthcare Platform</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/favicon.png" />
    <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:300,400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/modern.css">
</head>
<body>
    <div class="pulsestream-bg"></div>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand font-weight-bold d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="PulseStream" class="ps-logo mr-2"> PulseStream
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="services.html">ABOUT</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="contact.html">CONTACT</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container register">
        <div class="row">
            <div class="col-md-3 register-left">
                <img src="images/logo.png" alt="logo" />
                <h2 class="font-weight-light">Welcome to</h2>
                <h1 class="font-weight-bold">PulseStream</h1>
                <p class="mt-4 opacity-75 small">Automated Patient-Doctor Synchronization Engine</p>
            </div>
            <div class="col-md-9">
                <div class="glass-card">
                    <ul class="nav nav-tabs nav-tabs-modern nav-justified" id="myTab" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="home-tab" data-toggle="tab" href="#home" role="tab">Register Patient</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="profile-tab" data-toggle="tab" href="#profile" role="tab">Doctor Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="admin-tab" data-toggle="tab" href="#admin" role="tab">Receptionist</a>
                        </li>
                    </ul>
                    <div class="tab-content" id="myTabContent">
                        <div class="tab-pane fade show active" id="home" role="tabpanel">
                            <form id="patientRegForm">
                                <div class="row mt-4">
                                    <div class="col-md-6">
                                        <div class="form-group"><input type="text" class="form-control-modern form-control" placeholder="First Name *" name="fname" required /></div>
                                        <div class="form-group"><input type="email" class="form-control-modern form-control" placeholder="Email *" name="email" required /></div>
                                        <div class="form-group"><input type="password" class="form-control-modern form-control" placeholder="Password *" name="password" required /></div>
                                        <div class="maxl mt-2">
                                            <label class="radio inline mr-3"><input type="radio" name="gender" value="Male" checked><span> Male </span></label>
                                            <label class="radio inline"><input type="radio" name="gender" value="Female"><span> Female </span></label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group"><input type="text" class="form-control-modern form-control" placeholder="Last Name *" name="lname" required /></div>
                                        <div class="form-group"><input type="tel" minlength="10" maxlength="10" name="contact" class="form-control-modern form-control" placeholder="Phone *" required /></div>
                                        <div class="form-group"><input type="password" class="form-control-modern form-control" placeholder="Confirm Password *" name="cpassword" required /></div>
                                        <input type="submit" class="btnRegister" value="Sign Up" />
                                        <div class="text-center mt-3"><a href="index1.html" class="small text-white-50">Already have an account?</a></div>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="profile" role="tabpanel">
                            <form action="/login" method="post" class="mt-4">
                                <input type="hidden" name="tab" value="profile">
                                <div class="form-group"><input type="text" class="form-control-modern form-control" placeholder="Doctor Username *" name="username" required /></div>
                                <div class="form-group"><input type="password" class="form-control-modern form-control" placeholder="Password *" name="password" required /></div>
                                <input type="submit" class="btnRegister" value="Login" />
                                <div class="text-right mt-2"><a href="forgot_password.html" class="small text-white-50">Forgot Password?</a></div>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="admin" role="tabpanel">
                            <form action="/login" method="post" class="mt-4">
                                <input type="hidden" name="tab" value="admin">
                                <div class="form-group"><input type="text" class="form-control-modern form-control" placeholder="Admin Username *" name="username" required /></div>
                                <div class="form-group"><input type="password" class="form-control-modern form-control" placeholder="Password *" name="password" required /></div>
                                <input type="submit" class="btnRegister" value="Login" />
                                <div class="text-right mt-2"><a href="forgot_password.html" class="small text-white-50">Forgot Password?</a></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="js/modern.js"></script>
</body>
</html>
